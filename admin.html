<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="theme-color" content="#111827"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <link rel="manifest" href="manifest.json"/>
  <title>TD Gestión — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div id="splash"><div id="splash-logo">TOMÁS DOTTI</div><div id="splash-sub">BOLSAS Y ROLLOS DE RESIDUOS</div><div id="splash-dot"></div></div>
  <div id="root"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-presets="react">
const {useState,useEffect,useRef}=React;

// Guard: solo admin
(()=>{ const s=getSess(); if(!s||s.role!=="admin") window.location.href="index.html"; })();

function useMobile(){ const [m,setM]=useState(window.innerWidth<768); useEffect(()=>{const h=()=>setM(window.innerWidth<768);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);return m; }

function Field({label,children}){return(<div style={{marginBottom:14}}><label style={{display:"block",color:GR,fontSize:11,marginBottom:5,letterSpacing:1}}>{label.toUpperCase()}</label>{children}</div>);}
function Modal({title,children,onClose}){return(<div style={{position:"fixed",inset:0,background:"#000c",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}><div style={{background:CB,border:"1px solid "+BR,borderRadius:16,padding:28,width:440,maxWidth:"95vw",maxHeight:"90vh",overflowY:"auto"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}><h3 style={{color:W,fontFamily:"Orbitron,sans-serif",fontSize:15,margin:0}}>{title}</h3><button onClick={onClose} style={{background:"transparent",border:"none",color:GR,cursor:"pointer",fontSize:20}}>✕</button></div>{children}</div></div>);}

// ── Navigation ────────────────────────────────────────────────────────────────
const NAV_SIDE=[
  {id:"dashboard",label:"Dashboard",icon:"⊞"},
  {id:"productos",label:"Productos / Stock",icon:"📦"},
  {id:"clientes",label:"Clientes",icon:"👥"},
  {id:"nueva-venta",label:"Nueva Venta",icon:"🛒"},
  {id:"comprobantes",label:"Comprobantes",icon:"🧾"},
  {id:"remitos",label:"Remitos",icon:"🚚"},
  {id:"listas",label:"Listas de Precios",icon:"🏷️"},
  {id:"proveedor",label:"Proveedores",icon:"🏭"},
  {id:"config",label:"Configuración",icon:"⚙️"},
];
const NAV_BOT_MAIN=[
  {id:"dashboard",label:"Inicio",icon:"⊞"},
  {id:"nueva-venta",label:"Venta",icon:"🛒"},
  {id:"productos",label:"Productos",icon:"📦"},
  {id:"comprobantes",label:"Comp.",icon:"🧾"},
];
const NAV_MAS=[
  {id:"clientes",label:"Clientes",icon:"👥"},
  {id:"remitos",label:"Remitos",icon:"🚚"},
  {id:"listas",label:"Listas",icon:"🏷️"},
  {id:"proveedor",label:"Proveedores",icon:"🏭"},
  {id:"config",label:"Config.",icon:"⚙️"},
];

function Sidebar({view,setView,collapsed,setCollapsed}){
  const logout=()=>{clearSess();window.location.href="index.html";};
  return(
    <aside style={{width:collapsed?60:220,background:"#0c1420",borderRight:"1px solid "+BR,display:"flex",flexDirection:"column",transition:"width 0.2s",flexShrink:0,overflow:"hidden"}}>
      <div style={{padding:"18px 12px 16px",borderBottom:"1px solid "+BR,display:"flex",alignItems:"center",gap:8}}>
        <button onClick={()=>setCollapsed(c=>!c)} style={{background:"transparent",border:"none",color:GR,cursor:"pointer",fontSize:18,padding:0,flexShrink:0}}>☰</button>
        {!collapsed&&<div><div style={{fontFamily:"Orbitron,sans-serif",fontSize:11,color:W,fontWeight:700,letterSpacing:1,whiteSpace:"nowrap"}}>TOMÁS DOTTI</div><div style={{fontSize:8,color:G,letterSpacing:1,whiteSpace:"nowrap"}}>BOLSAS Y ROLLOS</div></div>}
      </div>
      <nav style={{padding:"12px 0",flex:1,overflowY:"auto"}}>
        {NAV_SIDE.map(item=>(
          <button key={item.id} onClick={()=>setView(item.id)} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:collapsed?"11px 18px":"11px 16px",background:view===item.id?G+"20":"transparent",border:"none",borderLeft:view===item.id?"3px solid "+G:"3px solid transparent",color:view===item.id?G:GR,cursor:"pointer",fontSize:13,fontFamily:"Montserrat,sans-serif",fontWeight:view===item.id?700:400,textAlign:"left",whiteSpace:"nowrap"}}>
            <span style={{fontSize:16,flexShrink:0}}>{item.icon}</span>
            {!collapsed&&<span>{item.label}</span>}
          </button>
        ))}
      </nav>
      <div style={{borderTop:"1px solid "+BR}}>
        <button onClick={logout} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:collapsed?"11px 18px":"11px 16px",background:"transparent",border:"none",color:RE,cursor:"pointer",fontSize:13,fontFamily:"Montserrat,sans-serif",textAlign:"left",whiteSpace:"nowrap"}}>
          <span style={{fontSize:16,flexShrink:0}}>🚪</span>{!collapsed&&<span>Cerrar sesión</span>}
        </button>
      </div>
    </aside>
  );
}

function TopBar({title}){
  return(<div style={{background:"#0c1420",borderBottom:"1px solid "+BR,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
    <div style={{fontFamily:"Orbitron,sans-serif",fontSize:11,color:G,letterSpacing:2}}>{title||"TD GESTIÓN"}</div>
    <span style={{fontSize:11,color:GR,background:CB,padding:"2px 8px",borderRadius:10}}>Admin</span>
  </div>);
}

function BottomNav({view,setView}){
  const [mas,setMas]=useState(false);
  const inMas=NAV_MAS.some(n=>n.id===view);
  const logout=()=>{clearSess();window.location.href="index.html";};
  return(<>
    {mas&&(<div style={{position:"fixed",inset:0,zIndex:50}} onClick={()=>setMas(false)}>
      <div style={{position:"absolute",bottom:58,left:0,right:0,background:"#0c1420",borderTop:"1px solid "+BR,padding:"10px 14px 6px"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:8}}>
          {NAV_MAS.map(n=>(
            <button key={n.id} onClick={()=>{setView(n.id);setMas(false);}} style={{background:view===n.id?G+"22":CB,border:"1px solid "+(view===n.id?G:BR),borderRadius:10,padding:"10px 6px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <span style={{fontSize:22}}>{n.icon}</span>
              <span style={{fontSize:10,color:view===n.id?G:GR,fontFamily:"Montserrat,sans-serif"}}>{n.label}</span>
            </button>
          ))}
        </div>
        <button onClick={logout} style={{...Btn(RE+"22",RE,{width:"100%",fontSize:12,padding:"9px"})}}>🚪 Cerrar sesión</button>
      </div>
    </div>)}
    <nav style={{background:"#0c1420",borderTop:"1px solid "+BR,display:"flex",flexShrink:0}}>
      {NAV_BOT_MAIN.map(n=>{
        const act=view===n.id;
        return(<button key={n.id} onClick={()=>setView(n.id)} style={{flex:1,background:"transparent",border:"none",padding:"8px 4px 10px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
          <span style={{fontSize:20}}>{n.icon}</span>
          <span style={{fontSize:9,color:act?G:GR,fontFamily:"Montserrat,sans-serif",fontWeight:act?700:400}}>{n.label}</span>
          {act&&<div style={{width:4,height:4,borderRadius:"50%",background:G}}/>}
        </button>);
      })}
      <button onClick={()=>setMas(s=>!s)} style={{flex:1,background:mas||inMas?G+"15":"transparent",border:"none",padding:"8px 4px 10px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
        <span style={{fontSize:20}}>☰</span>
        <span style={{fontSize:9,color:mas||inMas?G:GR,fontFamily:"Montserrat,sans-serif",fontWeight:mas||inMas?700:400}}>Más</span>
        {inMas&&<div style={{width:4,height:4,borderRadius:"50%",background:G}}/>}
      </button>
    </nav>
  </>);
}

// ── Config ───────────────────────────────────────────────────────────────────
function Config(){
  const [na,setNa]=useState(""); const [nv,setNv]=useState(""); const [msg,setMsg]=useState("");
  const save=()=>{
    let ok=false;
    if(na&&na.length>=6){localStorage.setItem("td_pass_admin",na);ok=true;}
    if(nv&&nv.length>=6){localStorage.setItem("td_pass_vend",nv);ok=true;}
    if(ok){setMsg("✓ Contraseñas actualizadas.");setNa("");setNv("");setTimeout(()=>setMsg(""),3000);}
    else setMsg("Mínimo 6 caracteres por contraseña.");
  };
  return(<div style={{padding:28,maxWidth:480}}>
    <h1 style={{fontFamily:"Orbitron,sans-serif",fontSize:20,color:W,marginBottom:24}}>Configuración</h1>
    <div style={{background:CA,border:"1px solid "+BR,borderRadius:12,padding:24,marginBottom:16}}>
      <div style={{color:G,fontSize:11,fontWeight:700,marginBottom:18,letterSpacing:1}}>🔐 CAMBIAR CONTRASEÑAS</div>
      <Field label="Nueva contraseña — Admin (mín. 6)"><input style={inp} type="password" value={na} onChange={e=>setNa(e.target.value)} placeholder="Nueva contraseña admin"/></Field>
      <Field label="Nueva contraseña — Vendedor (mín. 6)"><input style={inp} type="password" value={nv} onChange={e=>setNv(e.target.value)} placeholder="Nueva contraseña vendedor"/></Field>
      {msg&&<div style={{color:msg.startsWith("✓")?G:YE,fontSize:12,marginBottom:12,padding:"8px",background:(msg.startsWith("✓")?G:YE)+"15",borderRadius:8}}>{msg}</div>}
      <button onClick={save} style={{...Btn(G,D),width:"100%"}}>Guardar cambios</button>
    </div>
    <div style={{background:CA,border:"1px solid "+RE+"44",borderRadius:12,padding:24}}>
      <div style={{color:RE,fontSize:11,fontWeight:700,marginBottom:12,letterSpacing:1}}>🚪 SESIÓN</div>
      <button onClick={()=>{clearSess();window.location.href="index.html";}} style={{...Btn(RE,W),width:"100%"}}>Cerrar sesión</button>
    </div>
  </div>);
}

// ── Dashboard ────────────────────────────────────────────────────────────────
function Dashboard({productos,clientes,ventas,setView}){
  const hoy=fdate(new Date());
  const vh=ventas.filter(v=>fdate(v.fecha)===hoy);
  const tot=vh.reduce((a,v)=>a+v.total,0);
  const sb=productos.filter(p=>p.stock<=p.stockMin);
  const pend=ventas.filter(v=>v.estado==="pendiente");
  return(<div style={{padding:24}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:20,flexWrap:"wrap",gap:10}}>
      <div><h1 style={{fontFamily:"Orbitron,sans-serif",fontSize:18,color:W,margin:0}}>Dashboard</h1><p style={{color:GR,fontSize:11,marginTop:3}}>{new Date().toLocaleDateString("es-AR",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</p></div>
      <button onClick={()=>setView("nueva-venta")} style={{...Btn(G,D),fontFamily:"Orbitron,sans-serif",fontSize:11,letterSpacing:1}}>+ NUEVA VENTA</button>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12,marginBottom:20}}>
      {[[money(tot),"Ventas hoy",vh.length+" pedidos",G],[clientes.length,"Clientes","registrados","#60a5fa"],[pend.length,"Entregas pend.","por entregar",YE],[sb.length,"Alertas stock","productos bajos",sb.length>0?RE:G]].map(([v,l,s,c],i)=>(
        <div key={i} style={{background:CA,border:"1px solid "+BR,borderRadius:12,padding:16}}>
          <div style={{color:GR,fontSize:10,marginBottom:6,letterSpacing:1}}>{l.toUpperCase()}</div>
          <div style={{fontFamily:"Orbitron,sans-serif",fontSize:20,color:c,fontWeight:700}}>{v}</div>
          <div style={{color:GR,fontSize:10,marginTop:3}}>{s}</div>
        </div>
      ))}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:14}}>
      <div style={{background:CA,border:"1px solid "+BR,borderRadius:12,padding:18}}>
        <h3 style={{color:W,fontSize:12,marginBottom:12,fontWeight:700}}>⚠️ Alertas de Stock</h3>
        {sb.length===0?<p style={{color:G,fontSize:12}}>✓ Todo el stock está bien</p>:sb.map(p=>(<div key={p.id} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid "+BR,fontSize:12}}><span style={{color:W}}>{p.nombre}</span><span style={{color:p.stock===0?RE:YE,fontWeight:600}}>{p.stock}</span></div>))}
      </div>
      <div style={{background:CA,border:"1px solid "+BR,borderRadius:12,padding:18}}>
        <h3 style={{color:W,fontSize:12,marginBottom:12,fontWeight:700}}>🧾 Últimas Ventas</h3>
        {[...ventas].slice(0,5).map(v=>(<div key={v.id} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid "+BR,fontSize:12}}>
          <div><div style={{color:W,fontWeight:600}}>{v.clienteNombre}</div><div style={{color:GR,fontSize:10}}>{fdate(v.fecha)}</div></div>
          <div style={{textAlign:"right"}}><div style={{color:G,fontWeight:700}}>{money(v.total)}</div><div style={{fontSize:10,color:v.estado==="pendiente"?YE:G}}>{v.estado}</div></div>
        </div>))}
        {ventas.length===0&&<p style={{color:GR,fontSize:12}}>No hay ventas aún</p>}
      </div>
    </div>
  </div>);
}

// ── Productos ────────────────────────────────────────────────────────────────
function ProdForm({init,onSave,onClose}){
  const [f,setF]=useState(init);const s=(k,v)=>setF(x=>({...x,[k]:v}));
  return(<>
    <Field label="Nombre"><input style={inp} value={f.nombre} onChange={e=>s("nombre",e.target.value)}/></Field>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <Field label="Costo ($)"><input style={inp} type="number" value={f.costo||0} onChange={e=>s("costo",+e.target.value)}/></Field>
      <Field label="Precio ($)"><input style={inp} type="number" value={f.precio} onChange={e=>s("precio",+e.target.value)}/></Field>
      <Field label="Stock"><input style={inp} type="number" value={f.stock} onChange={e=>s("stock",+e.target.value)}/></Field>
      <Field label="Stock mín."><input style={inp} type="number" value={f.stockMin} onChange={e=>s("stockMin",+e.target.value)}/></Field>
    </div>
    <Field label="Unidad"><input style={inp} value={f.unidad} onChange={e=>s("unidad",e.target.value)}/></Field>
    <Field label="Categoría"><select style={inp} value={f.categoria} onChange={e=>s("categoria",e.target.value)}>{CATS.map(c=><option key={c}>{c}</option>)}</select></Field>
    <div style={{display:"flex",gap:10,marginTop:8}}>
      <button onClick={onClose} style={{...Btn("transparent",GR),flex:1}}>Cancelar</button>
      <button onClick={()=>onSave(f)} style={{...Btn(G,D),flex:1}}>Guardar</button>
    </div>
  </>);
}

function Productos({productos,setProd,isMobile}){
  const [modal,setModal]=useState(null);const [search,setSearch]=useState("");const [cat,setCat]=useState("Todos");
  const cats=["Todos",...new Set(productos.map(p=>p.categoria))];
  const fil=productos.filter(p=>(cat==="Todos"||p.categoria===cat)&&p.nombre.toLowerCase().includes(search.toLowerCase()));
  const save=async d=>{await db.saveProd(d,productos,setProd);setModal(null);};
  const del=async id=>{if(confirm("¿Eliminar producto?"))await db.delProd(id,setProd);};
  return(<div style={{padding:20}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <h1 style={{fontFamily:"Orbitron,sans-serif",fontSize:18,color:W,margin:0}}>Productos & Stock</h1>
      <button onClick={()=>setModal({nombre:"",categoria:"Bolsas de Residuos",costo:0,precio:0,stock:0,stockMin:10,unidad:"bulto"})} style={Btn(G,D)}>+ Nuevo</button>
    </div>
    <input placeholder="Buscar..." value={search} onChange={e=>setSearch(e.target.value)} style={{...inp,marginBottom:10,maxWidth:320}}/>
    <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
      {cats.map(c=>(<button key={c} onClick={()=>setCat(c)} style={{background:cat===c?G:"transparent",color:cat===c?D:GR,border:"1px solid "+(cat===c?G:BR),borderRadius:20,padding:"4px 12px",fontSize:11,fontWeight:cat===c?700:400,cursor:"pointer",fontFamily:"Montserrat,sans-serif"}}>{c}</button>))}
    </div>
    {isMobile?(
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {fil.map(p=>{
          const est=p.stock===0?"SIN STOCK":p.stock<=p.stockMin?"BAJO":"OK";
          const ec=est==="OK"?G:est==="BAJO"?YE:RE;
          return(<div key={p.id} style={{background:CA,border:"1px solid "+BR,borderRadius:12,padding:14}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
              <div style={{flex:1,marginRight:10}}>
                <div style={{color:W,fontSize:12,fontWeight:700,marginBottom:2}}>{p.nombre}</div>
                <div style={{color:GR,fontSize:10}}>{p.categoria}</div>
              </div>
              <span style={{background:ec+"22",color:ec,padding:"3px 8px",borderRadius:20,fontSize:9,fontWeight:700,height:"fit-content"}}>{est}</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>
              <div><div style={{color:GR,fontSize:9,marginBottom:2}}>PRECIO</div><div style={{color:G,fontWeight:700,fontSize:12}}>{money(p.precio)}</div></div>
              <div><div style={{color:GR,fontSize:9,marginBottom:2}}>STOCK</div><div style={{color:W,fontSize:12}}>{p.stock}</div></div>
              <div><div style={{color:GR,fontSize:9,marginBottom:2}}>MARGEN</div><div style={{color:p.costo>0?G:GR,fontSize:12}}>{p.costo>0?Math.round(((p.precio-p.costo)/p.precio)*100)+"%":"—"}</div></div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setModal({...p})} style={{...Btn("transparent",GR,{flex:1,padding:"7px",fontSize:12})}}>✏️ Editar</button>
              <button onClick={()=>del(p.id)} style={{...Btn("transparent",RE,{flex:1,padding:"7px",fontSize:12,borderColor:RE+"55"})}}>✕ Eliminar</button>
            </div>
          </div>);
        })}
      </div>
    ):(
      <div style={{background:CA,border:"1px solid "+BR,borderRadius:12,overflow:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",minWidth:700}}>
          <thead><tr style={{background:"#0f1b2d"}}>{["Producto","Categoría","Costo","Precio","Margen","Stock","Estado",""].map(h=>(<th key={h} style={{padding:"10px 14px",textAlign:"left",color:GR,fontSize:10,fontWeight:700,letterSpacing:1,whiteSpace:"nowrap"}}>{h}</th>))}</tr></thead>
          <tbody>{fil.map(p=>{
            const est=p.stock===0?"SIN STOCK":p.stock<=p.stockMin?"BAJO":"OK";
            const ec=est==="OK"?G:est==="BAJO"?YE:RE;
            const mgn=p.costo>0?Math.round(((p.precio-p.costo)/p.precio)*100):null;
            return(<tr key={p.id} style={{borderTop:"1px solid "+BR}}>
              <td style={{padding:"11px 14px",color:W,fontSize:12}}>{p.nombre}</td>
              <td style={{padding:"11px 14px",color:GR,fontSize:11}}>{p.categoria}</td>
              <td style={{padding:"11px 14px",color:GR,fontSize:12}}>{p.costo>0?money(p.costo):"—"}</td>
              <td style={{padding:"11px 14px",color:G,fontWeight:700,fontSize:12}}>{money(p.precio)}</td>
              <td style={{padding:"11px 14px",fontSize:12,fontWeight:700,color:mgn===null?GR:mgn>=30?G:mgn>=15?YE:RE}}>{mgn!==null?mgn+"%":"—"}</td>
              <td style={{padding:"11px 14px",color:W,fontSize:12}}>{p.stock.toLocaleString("es-AR")} {p.unidad}s</td>
              <td style={{padding:"11px 14px"}}><span style={{background:ec+"22",color:ec,padding:"3px 10px",borderRadius:20,fontSize:10,fontWeight:700}}>{est}</span></td>
              <td style={{padding:"11px 14px"}}><div style={{display:"flex",gap:6}}>
                <button onClick={()=>setModal({...p})} style={{...Btn("transparent",GR,{padding:"4px 10px",fontSize:11})}}>✏️</button>
                <button onClick={()=>del(p.id)} style={{...Btn("transparent",RE,{padding:"4px 10px",fontSize:11,borderColor:RE+"55"})}}>✕</button>
              </div></td>
            </tr>);
          })}</tbody>
        </table>
      </div>
    )}
    {modal&&<Modal title={modal.id?"Editar Producto":"Nuevo Producto"} onClose={()=>setModal(null)}><ProdForm init={modal} onSave={save} onClose={()=>setModal(null)}/></Modal>}
  </div>);
}

// ── Clientes ─────────────────────────────────────────────────────────────────
function CliForm({init,onSave,onClose}){
  const [f,setF]=useState(init);const s=(k,v)=>setF(x=>({...x,[k]:v}));
  return(<>
    {[["nombre","Nombre"],["direccion","Dirección"],["telefono","Teléfono"],["cuit","CUIT"],["zona","Zona"]].map(([k,l])=>(<Field key={k} label={l}><input style={inp} value={f[k]||""} onChange={e=>s(k,e.target.value)}/></Field>))}
    <div style={{display:"flex",gap:10,marginTop:8}}>
      <button onClick={onClose} style={{...Btn("transparent",GR),flex:1}}>Cancelar</button>
      <button onClick={()=>onSave(f)} style={{...Btn(G,D),flex:1}}>Guardar</button>
    </div>
  </>);
}

function Clientes({clientes,setCli}){
  const [modal,setModal]=useState(null);const [search,setSearch]=useState("");
  const fil=clientes.filter(c=>c.nombre.toLowerCase().includes(search.toLowerCase())||(c.zona||"").toLowerCase().includes(search.toLowerCase()));
  const save=async d=>{await db.saveCli(d,setCli);setModal(null);};
  const del=async id=>{if(confirm("¿Eliminar cliente?"))await db.delCli(id,setCli);};
  return(<div style={{padding:20}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <h1 style={{fontFamily:"Orbitron,sans-serif",fontSize:18,color:W,margin:0}}>Clientes</h1>
      <button onClick={()=>setModal({nombre:"",direccion:"",telefono:"",cuit:"",zona:""})} style={Btn(G,D)}>+ Nuevo</button>
    </div>
    <input placeholder="Buscar..." value={search} onChange={e=>setSearch(e.target.value)} style={{...inp,marginBottom:16,maxWidth:320}}/>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12}}>
      {fil.map(c=>(<div key={c.id} style={{background:CA,border:"1px solid "+BR,borderRadius:12,padding:16}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
          <div style={{fontFamily:"Orbitron,sans-serif",fontSize:11,color:W,fontWeight:700}}>{c.nombre}</div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>setModal({...c})} style={{...Btn("transparent",GR,{padding:"3px 8px",fontSize:11})}}>✏️</button>
            <button onClick={()=>del(c.id)} style={{...Btn("transparent",RE,{padding:"3px 8px",fontSize:11,borderColor:RE+"55"})}}>✕</button>
          </div>
        </div>
        {[["📍",c.direccion],["📱",c.telefono],["🪪",c.cuit],["🗺️",c.zona]].map(([ic,val],i)=>val&&(<div key={i} style={{display:"flex",gap:8,marginBottom:4,fontSize:12}}><span>{ic}</span><span style={{color:GR}}>{val}</span></div>))}
      </div>))}
    </div>
    {modal&&<Modal title={modal.id?"Editar Cliente":"Nuevo Cliente"} onClose={()=>setModal(null)}><CliForm init={modal} onSave={save} onClose={()=>setModal(null)}/></Modal>}
  </div>);
}

// ── Nueva Venta ──────────────────────────────────────────────────────────────
function NuevaVenta({productos,setProd,clientes,ventas,setVentas,setView,isMobile}){
  const [tab,setTab]=useState("catalogo");
  const [clienteId,setClienteId]=useState("");const [usarLista,setUsarLista]=useState(true);const [clienteMan,setClienteMan]=useState("");
  const [items,setItems]=useState([]);const [nota,setNota]=useState("");const [descuento,setDescuento]=useState(0);const [ok,setOk]=useState(null);
  const [desc,setDesc]=useState("");const [detalle,setDetalle]=useState("");const [cantL,setCantL]=useState(1);const [unidadL,setUnidadL]=useState("unidades");const [precioL,setPrecioL]=useState("");
  const [provQuick,setProvQuick]=useState("");const [provTelQ,setProvTelQ]=useState("");const [repoEnv,setRepoEnv]=useState(false);const [saving,setSaving]=useState(false);
  const cliente=usarLista?clientes.find(c=>c.id===+clienteId):null;
  const nombreCli=usarLista?(cliente?.nombre||""):clienteMan;
  const sub=items.reduce((a,i)=>a+i.precio*i.cantidad,0);
  const total=sub-sub*descuento/100;
  const addLibre=()=>{
    if(!desc.trim()||cantL<=0||!precioL){alert("Completá descripción, cantidad y precio.");return;}
    const nm=detalle?desc.trim()+" ("+detalle.trim()+")":desc.trim();
    setItems(prev=>[...prev,{productoId:uid(),nombre:nm,cantidad:+cantL,unidad:unidadL,precio:+precioL,tipo:"libre"}]);
    setDesc("");setCantL(1);setUnidadL("unidades");setPrecioL("");setDetalle("");
  };
  const confirmar=async()=>{
    if(!nombreCli||items.length===0){alert("Seleccioná cliente y agregá productos.");return;}
    setSaving(true);
    const nro="TD"+Date.now().toString(36).toUpperCase().slice(-6)+Math.random().toString(36).toUpperCase().slice(2,5);
    const hayCat=items.some(i=>i.tipo==="catalogo");const hayLib=items.some(i=>i.tipo==="libre");
    const venta={nro,fecha:new Date().toISOString(),clienteId:cliente?.id||null,clienteNombre:nombreCli,clienteDireccion:cliente?.direccion||"",clienteTelefono:cliente?.telefono||"",clienteCuit:cliente?.cuit||"",items,subtotal:sub,descuento,total,nota,estado:"pendiente",esLibre:hayLib&&!hayCat,esMixto:hayLib&&hayCat};
    const saved=await db.saveVenta(venta);
    if(saved){
      if(hayCat) await db.updateStock(items,productos,setProd);
      setVentas(prev=>[saved,...prev]);
      setOk(saved);
    }
    setSaving(false);
  };
  const reset=()=>{setItems([]);setClienteId("");setClienteMan("");setNota("");setDescuento(0);setOk(null);setProvQuick("");setProvTelQ("");setRepoEnv(false);};
  const enviarRepo=()=>{
    if(!provQuick){alert("Seleccioná proveedor.");return;}
    const its=(ok?.items||[]).filter(i=>i.tipo==="catalogo");
    const lineas=its.map(i=>"• "+i.nombre+"\n  Cantidad: "+i.cantidad+" "+i.unidad+"s").join("\n");
    const txt="📦 *PEDIDO REPOSICIÓN — TOMÁS DOTTI*\n📅 "+new Date().toLocaleDateString("es-AR")+"\nProveedor: *"+provQuick+"*\n_(Venta "+ok.nro+")_\n\nNecesito reponer:\n\n"+lineas+"\n\nPor favor confirmame disponibilidad. ¡Gracias!";
    waOpen(provTelQ,txt);setRepoEnv(true);
  };

  if(ok){
    const itsCat=(ok.items||[]).filter(i=>i.tipo==="catalogo");
    return(<div style={{padding:20,display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:16,alignItems:"start"}}>
      <div style={{background:G+"18",border:"1px solid "+G,borderRadius:16,padding:24,textAlign:"center"}}>
        <div style={{fontSize:44,marginBottom:10}}>✅</div>
        <h2 style={{color:G,fontFamily:"Orbitron,sans-serif",fontSize:15,marginBottom:8}}>¡Venta Confirmada!</h2>
        <p style={{color:W,marginBottom:4,fontSize:13}}>Cód. {ok.nro}</p>
        <p style={{color:GR,fontSize:12,marginBottom:16}}>{ok.clienteNombre} — {money(ok.total)}</p>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <button onClick={()=>setView("comprobantes")} style={{...Btn(G,D),width:"100%"}}>🧾 Ver Comprobante</button>
          <button onClick={()=>setView("remitos")} style={{...Btn("transparent",W),width:"100%"}}>🚚 Ver Remito</button>
          <button onClick={reset} style={{...Btn("transparent",GR),width:"100%"}}>+ Nueva Venta</button>
        </div>
      </div>
      <div style={{background:CA,border:"1px solid "+BR,borderRadius:16,padding:20}}>
        <div style={{fontFamily:"Orbitron,sans-serif",fontSize:12,color:W,marginBottom:4}}>🏭 PEDIR REPOSICIÓN</div>
        <div style={{color:GR,fontSize:11,marginBottom:12}}>Pedile al proveedor lo que vendiste.</div>
        {itsCat.length===0?<div style={{color:GR,fontSize:12,fontStyle:"italic"}}>No hay ítems de catálogo.</div>:<>
          <div style={{marginBottom:10}}>{itsCat.map(it=>(<div key={it.productoId} style={{padding:"6px 10px",background:D,borderRadius:8,marginBottom:4,fontSize:12,color:W}}>{it.nombre} — {it.cantidad} {it.unidad}s</div>))}</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
            {["Antártida","Dottiplast","Flowi","Otro"].map(p=>(<button key={p} onClick={()=>setProvQuick(p)} style={{...Btn(provQuick===p?G:"transparent",provQuick===p?D:GR,{padding:"5px 12px",fontSize:11})}}>{p}</button>))}
          </div>
          <input style={{...inp,marginBottom:8}} placeholder="Teléfono WA (opcional)" value={provTelQ} onChange={e=>setProvTelQ(e.target.value)}/>
          {repoEnv?<div style={{padding:"10px",background:G+"22",borderRadius:8,color:G,fontSize:12,textAlign:"center"}}>✓ Pedido enviado</div>:<button onClick={enviarRepo} style={{...Btn(WA,W),width:"100%",fontSize:12}}>📲 Enviar pedido</button>}
        </>}
      </div>
    </div>);
  }

  const catView=(<div style={{background:CA,border:"1px solid "+BR,borderRadius:12,padding:12,marginBottom:12}}>
    <div style={{color:GR,fontSize:10,letterSpacing:1,marginBottom:10}}>📦 TOCÁ + / − PARA AGREGAR</div>
    <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":"repeat(auto-fill,minmax(180px,1fr))",gap:8}}>
      {productos.filter(p=>p.stock>0).map(p=>{
        const en=items.find(i=>i.productoId===p.id&&i.tipo==="catalogo");const cantAct=en?.cantidad||0;
        return(<div key={p.id} style={{background:cantAct>0?G+"18":D,border:"1px solid "+(cantAct>0?G:BR),borderRadius:10,padding:10,display:"flex",flexDirection:"column",gap:5}}>
          <div style={{color:W,fontSize:11,fontWeight:600,lineHeight:1.3}}>{p.nombre}</div>
          <div style={{color:G,fontSize:12,fontWeight:700}}>{money(p.precio)}</div>
          <div style={{color:GR,fontSize:10}}>Stock: {p.stock}</div>
          <div style={{display:"flex",alignItems:"center",gap:6,marginTop:3}}>
            <button onClick={()=>{if(cantAct<=1)setItems(prev=>prev.filter(i=>!(i.productoId===p.id&&i.tipo==="catalogo")));else setItems(prev=>prev.map(i=>i.productoId===p.id&&i.tipo==="catalogo"?{...i,cantidad:i.cantidad-1}:i));}} style={{background:cantAct>0?RE+"22":"#1a2232",border:"1px solid "+(cantAct>0?RE:BR),color:cantAct>0?RE:BR,borderRadius:8,width:32,height:32,fontSize:18,cursor:cantAct>0?"pointer":"default",fontWeight:700,lineHeight:"1.6"}}>−</button>
            <div style={{flex:1,textAlign:"center",fontFamily:"Orbitron,sans-serif",fontSize:16,color:cantAct>0?G:GR,fontWeight:700}}>{cantAct}</div>
            <button onClick={()=>{if(cantAct>=p.stock){alert("Stock máximo: "+p.stock);return;}if(cantAct===0)setItems(prev=>[...prev,{productoId:p.id,nombre:p.nombre,precio:p.precio,cantidad:1,unidad:p.unidad,tipo:"catalogo"}]);else setItems(prev=>prev.map(i=>i.productoId===p.id&&i.tipo==="catalogo"?{...i,cantidad:i.cantidad+1}:i));}} style={{background:G+"22",border:"1px solid "+G,color:G,borderRadius:8,width:32,height:32,fontSize:18,cursor:"pointer",fontWeight:700,lineHeight:"1.6"}}>+</button>
          </div>
        </div>);
      })}
    </div>
  </div>);

  const libreView=(<div style={{background:CA,border:"1px solid "+G+"44",borderRadius:12,padding:16,marginBottom:12}}>
    <div style={{color:G,fontSize:10,letterSpacing:1,marginBottom:12,fontWeight:800}}>✏️ PRODUCTO LIBRE — sin stock</div>
    <Field label="Descripción"><input style={inp} placeholder="Ej: Bolsa 100x160" value={desc} onChange={e=>setDesc(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addLibre()}/></Field>
    <Field label="Detalle extra (opcional)"><input style={inp} placeholder="Ej: 130 micrones, bulto x50" value={detalle} onChange={e=>setDetalle(e.target.value)}/></Field>
    <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 2fr auto",gap:8,alignItems:"flex-end"}}>
      <div><div style={{color:GR,fontSize:10,letterSpacing:1,marginBottom:5}}>CANTIDAD</div><input type="number" min={1} style={inp} value={cantL} onChange={e=>setCantL(+e.target.value)}/></div>
      <div><div style={{color:GR,fontSize:10,letterSpacing:1,marginBottom:5}}>UNIDAD</div><input style={inp} value={unidadL} onChange={e=>setUnidadL(e.target.value)}/></div>
      <div><div style={{color:GR,fontSize:10,letterSpacing:1,marginBottom:5}}>PRECIO ($)</div><input type="number" min={0} style={inp} placeholder="0" value={precioL} onChange={e=>setPrecioL(e.target.value)}/></div>
      <button onClick={addLibre} style={{...Btn(G,D,{padding:"10px 16px",fontSize:18,height:42,alignSelf:"flex-end"})}}>+</button>
    </div>
  </div>);

  const resumen=(<div style={{background:CA,border:"1px solid "+G+"55",borderRadius:16,padding:20}}>
    <div style={{fontFamily:"Orbitron,sans-serif",fontSize:12,color:W,marginBottom:16}}>RESUMEN</div>
    {items.length===0?<p style={{color:GR,fontSize:13,textAlign:"center",padding:"20px 0"}}>Agregá productos</p>:<>
      {items.map(it=>(<div key={it.productoId} style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:12,gap:8}}><span style={{color:it.tipo==="libre"?YE:GR,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{it.cantidad}× {it.nombre}</span><span style={{color:W,flexShrink:0}}>{money(it.precio*it.cantidad)}</span></div>))}
      {descuento>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:12,color:YE}}><span>Descuento {descuento}%</span><span>-{money(sub*descuento/100)}</span></div>}
      <div style={{borderTop:"1px solid "+BR,marginTop:12,paddingTop:12,display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
        <span style={{color:W,fontWeight:700}}>TOTAL</span>
        <span style={{fontFamily:"Orbitron,sans-serif",fontSize:20,color:G,fontWeight:700}}>{money(total)}</span>
      </div>
    </>}
    <div style={{marginTop:12}}><div style={{color:GR,fontSize:10,letterSpacing:1,marginBottom:5}}>DESCUENTO ({descuento}%)</div><input type="range" min={0} max={50} value={descuento} onChange={e=>setDescuento(+e.target.value)} style={{width:"100%",accentColor:G}}/></div>
    <button onClick={confirmar} disabled={saving} style={{...Btn(G,D),width:"100%",marginTop:10,fontFamily:"Orbitron,sans-serif",fontSize:12,letterSpacing:1,opacity:saving?0.7:1}}>{saving?"GUARDANDO...":"CONFIRMAR VENTA"}</button>
    {items.some(i=>i.tipo==="libre")&&<div style={{marginTop:8,padding:"6px 10px",background:YE+"15",borderRadius:8,fontSize:10,color:YE,textAlign:"center"}}>⚠️ Ítems libres no modifican stock</div>}
  </div>);

  if(isMobile) return(<div style={{padding:14,paddingBottom:80}}>
    <div style={{background:CA,border:"1px solid "+BR,borderRadius:12,padding:14,marginBottom:12}}>
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        {[["Lista",true],["Manual",false]].map(([l,v])=>(<button key={l} onClick={()=>setUsarLista(v)} style={{...Btn(usarLista===v?G:"transparent",usarLista===v?D:GR,{padding:"5px 12px",fontSize:11,flex:1})}}>{l}</button>))}
      </div>
      {usarLista?<select style={inp} value={clienteId} onChange={e=>setClienteId(e.target.value)}><option value="">Seleccioná cliente...</option>{clientes.map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}</select>:<input style={inp} placeholder="Nombre del cliente..." value={clienteMan} onChange={e=>setClienteMan(e.target.value)}/>}
    </div>
    <div style={{display:"flex",background:"#0c1420",borderRadius:10,padding:4,marginBottom:12,gap:4}}>
      {[["catalogo","📦 Catálogo"],["libre","✏️ Libre"]].map(([id,lbl])=>(<button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:"9px 8px",border:"none",borderRadius:8,cursor:"pointer",background:tab===id?G:"transparent",color:tab===id?D:GR,fontFamily:"Montserrat,sans-serif",fontWeight:tab===id?700:400,fontSize:13}}>{lbl}</button>))}
    </div>
    {tab==="catalogo"&&catView}
    {tab==="libre"&&libreView}
    {items.length>0&&<div style={{position:"fixed",bottom:60,left:0,right:0,background:"#0c1420",borderTop:"1px solid "+BR,padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",zIndex:40}}>
      <div><div style={{fontSize:10,color:GR}}>TOTAL ({items.length} ítem{items.length!==1?"s":""})</div><div style={{fontFamily:"Orbitron,sans-serif",fontSize:16,color:G,fontWeight:700}}>{money(total)}</div></div>
      <button onClick={confirmar} disabled={saving} style={{...Btn(G,D,{fontSize:12,padding:"10px 20px"}),opacity:saving?0.7:1}}>{saving?"...":"✓ Confirmar"}</button>
    </div>}
  </div>);

  return(<div style={{padding:20,display:"grid",gridTemplateColumns:"1fr 340px",gap:20,alignItems:"start"}}>
    <div>
      <h1 style={{fontFamily:"Orbitron,sans-serif",fontSize:18,color:W,margin:"0 0 18px"}}>Nueva Venta</h1>
      <div style={{background:CA,border:"1px solid "+BR,borderRadius:12,padding:16,marginBottom:12}}>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          {[["Desde lista",true],["Nombre manual",false]].map(([l,v])=>(<button key={l} onClick={()=>setUsarLista(v)} style={{...Btn(usarLista===v?G:"transparent",usarLista===v?D:GR,{padding:"5px 12px",fontSize:11})}}>{l}</button>))}
        </div>
        {usarLista?<><select style={inp} value={clienteId} onChange={e=>setClienteId(e.target.value)}><option value="">Seleccioná un cliente...</option>{clientes.map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}</select>{cliente&&<div style={{fontSize:12,color:GR,marginTop:8}}>📍 {cliente.direccion} · 📱 {cliente.telefono}</div>}</>:<input style={inp} placeholder="Nombre del cliente..." value={clienteMan} onChange={e=>setClienteMan(e.target.value)}/>}
      </div>
      <div style={{display:"flex",background:"#0c1420",borderRadius:10,padding:4,marginBottom:12,gap:4}}>
        {[["catalogo","📦 Del Catálogo","descuenta stock"],["libre","✏️ Producto Libre","no toca stock"]].map(([id,lbl,sub])=>(<button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:"10px 8px",border:"none",borderRadius:8,cursor:"pointer",background:tab===id?G:"transparent",color:tab===id?D:GR,fontFamily:"Montserrat,sans-serif",fontWeight:tab===id?700:400,fontSize:13}}>{lbl}<div style={{fontSize:9,opacity:0.7,marginTop:1}}>{sub}</div></button>))}
      </div>
      {tab==="catalogo"&&catView}
      {tab==="libre"&&libreView}
      {items.length>0&&(<div style={{background:CA,border:"1px solid "+BR,borderRadius:12,overflow:"hidden",marginBottom:12}}>
        <div style={{padding:"8px 14px",background:"#0f1b2d",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{color:GR,fontSize:10,fontWeight:700,letterSpacing:1}}>CARRITO ({items.length})</span></div>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr style={{background:"#161f2e"}}>{["Producto","Cant.","P.Unit.","Subtotal",""].map(h=>(<th key={h} style={{padding:"7px 12px",textAlign:"left",color:GR,fontSize:10,fontWeight:700}}>{h}</th>))}</tr></thead>
          <tbody>{items.map(it=>(<tr key={it.productoId} style={{borderTop:"1px solid "+BR}}>
            <td style={{padding:"9px 12px",fontSize:12}}><div style={{color:W}}>{it.nombre}</div>{it.tipo==="libre"&&<div style={{color:YE,fontSize:9}}>✏️ libre</div>}</td>
            <td style={{padding:"9px 12px",color:GR,fontSize:12}}>{it.cantidad} {it.unidad}</td>
            <td style={{padding:"9px 12px",color:GR,fontSize:12}}>{money(it.precio)}</td>
            <td style={{padding:"9px 12px",color:G,fontWeight:700,fontSize:12}}>{money(it.precio*it.cantidad)}</td>
            <td style={{padding:"9px 12px"}}><button onClick={()=>setItems(prev=>prev.filter(i=>i.productoId!==it.productoId))} style={{background:"transparent",border:"none",color:RE,cursor:"pointer",fontSize:16}}>✕</button></td>
          </tr>))}</tbody>
        </table>
      </div>)}
      <div style={{background:CA,border:"1px solid "+BR,borderRadius:12,padding:16}}>
        <Field label="Nota para el remito (opcional)"><textarea rows={2} value={nota} onChange={e=>setNota(e.target.value)} placeholder="Ej: Entregar por la tarde..." style={{...inp,resize:"none"}}/></Field>
      </div>
    </div>
    <div style={{position:"sticky",top:20}}>{resumen}</div>
  </div>);
}

// ── Comprobantes ─────────────────────────────────────────────────────────────
const loadH2C=()=>new Promise((res,rej)=>{if(window.html2canvas){res(window.html2canvas);return;}const s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";s.onload=()=>res(window.html2canvas);s.onerror=rej;document.head.appendChild(s);});

function Comprobantes({ventas,isMobile}){
  const [sel,setSel]=useState(null);const [cap,setCap]=useState(false);const ref=useRef(null);
  const v=ventas.find(x=>x.id===sel)||null;
  const txtWA=x=>{
    const lin=(x.items||[]).map(i=>"• "+i.nombre+"\n  "+i.cantidad+" "+i.unidad+"s x "+money(i.precio)+" = "+money(i.precio*i.cantidad)).join("\n");

      {prods.length===0?<div style={{padding:28,textAlign:"center",color:GR}}>No hay productos con precio.</div>:
      <table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead><tr style={{background:"#161f2e"}}>{["Artículo","Precio / unidad","Unidad"].map(h=>(<th key={h} style={{padding:"8px 14px",textAlign:"left",color:GR,fontSize:10,fontWeight:700,letterSpacing:1}}>{h}</th>))}</tr></thead>
        <tbody>{prods.map(p=>(<tr key={p.id} style={{borderTop:"1px solid "+BR}}><td style={{padding:"10px 14px",color:W,fontSize:12}}>{p.nombre}</td><td style={{padding:"10px 14px",color:G,fontWeight:700,fontSize:13}}>{money(p.precio)}</td><td style={{padding:"10px 14px",color:GR,fontSize:11}}>{p.unidad}</td></tr>))}</tbody>
      </table>}
      {lista.nota&&<div style={{padding:"8px 14px",background:YE+"0f",borderTop:"1px solid "+BR,color:YE,fontSize:11}}>📌 {lista.nota}</div>}
    </div>
    <div style={{display:"flex",gap:10}}>
      <button onClick={()=>waOpen(tel,txt)} style={{...Btn(WA,W),flex:1,fontFamily:"Orbitron,sans-serif",fontSize:11,letterSpacing:1}}>📲 {tel?"Enviar a "+tel:"Enviar por WhatsApp"}</button>
      <button onClick={()=>{navigator.clipboard?.writeText(txt).then(()=>{setCopiado(true);setTimeout(()=>setCopiado(false),2500);});}} style={{...Btn("transparent",copiado?G:GR,{padding:"10px 18px",fontSize:12,borderColor:copiado?G:BR})}}>{copiado?"✓ Copiado":"📋 Copiar"}</button>
    </div>
  </div>);

  if(isMobile) return(<div style={{padding:14}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
      <h1 style={{fontFamily:"Orbitron,sans-serif",fontSize:18,color:W,margin:0}}>Listas de Precios</h1>
      <button onClick={()=>setShowListas(s=>!s)} style={{...Btn("transparent",G,{padding:"6px 12px",fontSize:12})}}>📋 {showListas?"Ocultar":"Elegir lista"}</button>
    </div>
    {showListas&&<div style={{marginBottom:14}}>{listasPanel}</div>}
    {contenido}
  </div>);

  return(<div style={{padding:20,display:"grid",gridTemplateColumns:"260px 1fr",gap:20,alignItems:"start"}}>
    {listasPanel}{contenido}
  </div>);
}

// ── Proveedores ──────────────────────────────────────────────────────────────
function ProvForm({init,onSave,onClose}){
  const [f,setF]=useState(init);const s=(k,v)=>setF(x=>({...x,[k]:v}));
  return(<>
    <Field label="Nombre"><input style={inp} value={f.nombre||""} onChange={e=>s("nombre",e.target.value)}/></Field>
    <Field label="Teléfono WhatsApp"><input style={inp} placeholder="Ej: 2346625220" value={f.telefono||""} onChange={e=>s("telefono",e.target.value)}/></Field>
    <Field label="Dirección (opcional)"><input style={inp} value={f.direccion||""} onChange={e=>s("direccion",e.target.value)}/></Field>
    <Field label="Email (opcional)"><input style={inp} value={f.email||""} onChange={e=>s("email",e.target.value)}/></Field>
    <div style={{display:"flex",gap:10,marginTop:8}}><button onClick={onClose} style={{...Btn("transparent",GR),flex:1}}>Cancelar</button><button onClick={()=>onSave(f)} style={{...Btn(G,D),flex:1}}>Guardar</button></div>
  </>);
}

function Proveedores({productos,proveedores,setProv}){
  const [tab,setTab]=useState("pedido");const [modal,setModal]=useState(null);const [provSel,setProvSel]=useState("");const [items,setItems]=useState([]);const [prodSel,setProdSel]=useState("");const [cant,setCant]=useState(1);const [nota,setNota]=useState("");const [enviado,setEnviado]=useState(false);
  const save=async d=>{await db.saveProv(d,setProv);setModal(null);};
  const del=async id=>{if(confirm("¿Eliminar?"))await db.delProv(id,setProv);if(+provSel===id)setProvSel("");};
  const prov=proveedores.find(p=>p.id===+provSel);
  const addItem=()=>{const p=productos.find(x=>x.id===+prodSel);if(!p||cant<=0)return;setItems(prev=>{const ex=prev.find(i=>i.productoId===p.id);if(ex)return prev.map(i=>i.productoId===p.id?{...i,cantidad:i.cantidad+cant}:i);return[...prev,{productoId:p.id,nombre:p.nombre,cantidad:cant,unidad:p.unidad,categoria:p.categoria}];});setCant(1);setProdSel("");};
  const txtPedido=()=>{const lineas=items.map(i=>"• "+i.nombre+"\n  Cantidad: "+i.cantidad+" "+i.unidad+"s").join("\n");return "📦 *PEDIDO — TOMÁS DOTTI*\n📅 "+new Date().toLocaleDateString("es-AR")+"\nProveedor: *"+(prov?.nombre||"")+"*\n\nNecesito los siguientes productos:\n\n"+lineas+(nota?"\n\n📝 "+nota:"")+"\n\nPor favor confirmame disponibilidad y fecha de entrega. ¡Gracias!";};
  const enviar=()=>{if(!prov||items.length===0){alert("Seleccioná proveedor y agregá productos.");return;}waOpen(prov.telefono,txtPedido());setEnviado(true);};

  if(enviado)return(<div style={{padding:28,maxWidth:480}}><div style={{background:G+"18",border:"1px solid "+G,borderRadius:16,padding:28,textAlign:"center"}}><div style={{fontSize:44,marginBottom:10}}>📤</div><h2 style={{color:G,fontFamily:"Orbitron,sans-serif",fontSize:16,marginBottom:8}}>¡Pedido Enviado!</h2><p style={{color:GR,fontSize:13,marginBottom:20}}>A {prov?.nombre}</p><button onClick={()=>{setItems([]);setNota("");setEnviado(false);}} style={Btn(G,D)}>Nuevo Pedido</button></div></div>);

  return(<div style={{padding:20}}>
    {modal&&<Modal title={modal.id?"Editar Proveedor":"Nuevo Proveedor"} onClose={()=>setModal(null)}><ProvForm init={modal} onSave={save} onClose={()=>setModal(null)}/></Modal>}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
      <h1 style={{fontFamily:"Orbitron,sans-serif",fontSize:18,color:W,margin:0}}>Proveedores</h1>
      <div style={{display:"flex",background:"#0c1420",borderRadius:10,padding:4,gap:4}}>
        {[["pedido","📦 Pedido"],["lista","🏭 Proveedores"]].map(([id,lbl])=>(<button key={id} onClick={()=>setTab(id)} style={{padding:"8px 14px",border:"none",borderRadius:8,cursor:"pointer",background:tab===id?G:"transparent",color:tab===id?D:GR,fontFamily:"Montserrat,sans-serif",fontWeight:tab===id?700:400,fontSize:12}}>{lbl}</button>))}
      </div>
    </div>
    {tab==="lista"&&(<><div style={{display:"flex",justifyContent:"flex-end",marginBottom:14}}><button onClick={()=>setModal({nombre:"",telefono:"",direccion:"",email:""})} style={Btn(G,D)}>+ Nuevo Proveedor</button></div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:12}}>
        {proveedores.map(p=>(<div key={p.id} style={{background:CA,border:"1px solid "+BR,borderRadius:12,padding:16}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><div style={{fontFamily:"Orbitron,sans-serif",fontSize:12,color:W,fontWeight:700}}>🏭 {p.nombre}</div><div style={{display:"flex",gap:6}}><button onClick={()=>setModal({...p})} style={{...Btn("transparent",GR,{padding:"3px 8px",fontSize:11})}}>✏️</button><button onClick={()=>del(p.id)} style={{...Btn("transparent",RE,{padding:"3px 8px",fontSize:11,borderColor:RE+"55"})}}>✕</button></div></div>
          {p.telefono&&<div style={{color:GR,fontSize:12,marginBottom:2}}>📱 {p.telefono}</div>}
          {p.direccion&&<div style={{color:GR,fontSize:12,marginBottom:2}}>📍 {p.direccion}</div>}
          {p.email&&<div style={{color:GR,fontSize:12,marginBottom:8}}>✉️ {p.email}</div>}
          <button onClick={()=>{setProvSel(String(p.id));setTab("pedido");}} style={{...Btn(p.telefono?WA:"transparent",p.telefono?W:G,{width:"100%",fontSize:11,marginTop:6})}}>📦 Seleccionar para pedido</button>
        </div>))}
      </div>
    </>)}
    {tab==="pedido"&&(<div style={{display:"grid",gridTemplateColumns:"1fr 320px",gap:20,alignItems:"start"}}>
      <div>
        <div style={{background:CA,border:"1px solid "+BR,borderRadius:12,padding:16,marginBottom:12}}>
          <div style={{color:GR,fontSize:10,letterSpacing:1,marginBottom:8}}>PROVEEDOR</div>
          <div style={{display:"flex",gap:8}}>
            <select style={{...inp,flex:1}} value={provSel} onChange={e=>setProvSel(e.target.value)}><option value="">Seleccioná un proveedor...</option>{proveedores.map(p=><option key={p.id} value={p.id}>{p.nombre}{p.telefono?" · 📱 "+p.telefono:""}</option>)}</select>
            <button onClick={()=>setModal({nombre:"",telefono:"",direccion:"",email:""})} style={{...Btn(G,D,{padding:"10px 14px",fontSize:12,whiteSpace:"nowrap"})}}>+ Nuevo</button>
          </div>
          {prov&&!prov.telefono&&<div style={{marginTop:8,padding:"6px 10px",background:YE+"15",borderRadius:8,fontSize:11,color:YE}}>⚠️ Sin teléfono — editalo para enviar por WhatsApp</div>}
        </div>
        <div style={{background:CA,border:"1px solid "+BR,borderRadius:12,padding:16,marginBottom:12}}>
          <div style={{color:GR,fontSize:10,letterSpacing:1,marginBottom:10}}>PRODUCTOS A PEDIR</div>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <select style={{...inp,flex:1}} value={prodSel} onChange={e=>setProdSel(e.target.value)}><option value="">Seleccionar producto...</option>{productos.map(p=><option key={p.id} value={p.id}>{p.nombre}{p.stock<=p.stockMin?" ⚠️ stock bajo":""}</option>)}</select>
            <input type="number" min={1} value={cant} onChange={e=>setCant(+e.target.value)} onKeyDown={e=>e.key==="Enter"&&addItem()} style={{...inp,width:65,textAlign:"center"}}/>
            <button onClick={addItem} style={{...Btn(G,D,{padding:"10px 16px",fontSize:18})}}>+</button>
          </div>
        </div>
        {items.length>0&&(<div style={{background:CA,border:"1px solid "+BR,borderRadius:12,overflow:"hidden",marginBottom:12}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{background:"#0f1b2d"}}>{["Producto","Categoría","Cantidad",""].map(h=>(<th key={h} style={{padding:"8px 12px",textAlign:"left",color:GR,fontSize:10,fontWeight:700}}>{h}</th>))}</tr></thead>
            <tbody>{items.map(it=>(<tr key={it.productoId} style={{borderTop:"1px solid "+BR}}>
              <td style={{padding:"10px 12px",color:W,fontSize:12}}>{it.nombre}</td>
              <td style={{padding:"10px 12px",color:GR,fontSize:11}}>{it.categoria}</td>
              <td style={{padding:"10px 12px",color:G,fontWeight:700}}>{it.cantidad} {it.unidad}s</td>
              <td style={{padding:"10px 12px"}}><button onClick={()=>setItems(prev=>prev.filter(i=>i.productoId!==it.productoId))} style={{background:"transparent",border:"none",color:RE,cursor:"pointer",fontSize:16}}>✕</button></td>
            </tr>))}</tbody>
          </table>
        </div>)}
        <div style={{background:CA,border:"1px solid "+BR,borderRadius:12,padding:16}}>
          <Field label="Nota (opcional)"><textarea rows={2} value={nota} onChange={e=>setNota(e.target.value)} placeholder="Ej: Urgente, pago a 30 días..." style={{...inp,resize:"none"}}/></Field>
        </div>
      </div>
      <div style={{position:"sticky",top:20}}>
        <div style={{background:CA,border:"1px solid "+G+"55",borderRadius:16,padding:20}}>
          <div style={{fontFamily:"Orbitron,sans-serif",fontSize:11,color:W,marginBottom:12}}>VISTA PREVIA</div>
          <div style={{background:D,borderRadius:10,padding:12,fontSize:12,color:GR,lineHeight:1.8,whiteSpace:"pre-wrap",marginBottom:14,maxHeight:260,overflowY:"auto"}}>{items.length>0&&prov?txtPedido():<span style={{color:BR}}>Seleccioná proveedor y agregá productos...</span>}</div>
          <button onClick={enviar} style={{...Btn(WA,W),width:"100%",fontFamily:"Orbitron,sans-serif",fontSize:11,letterSpacing:1}}>📲 {prov?.telefono?"Enviar a "+prov.telefono:"Enviar por WhatsApp"}</button>
        </div>
      </div>
    </div>)}
  </div>);
}

// ── App ──────────────────────────────────────────────────────────────────────
function App(){
  const [view,setView]=useState("dashboard");
  const [productos,setProductos]=useState([]);
  const [clientes,setClientes]=useState([]);
  const [ventas,setVentas]=useState([]);
  const [proveedores,setProveedores]=useState([]);
  const [coll,setColl]=useState(false);
  const [loading,setLoading]=useState(true);
  const isMobile=useMobile();

  useEffect(()=>{
    (async()=>{
      try{
        let data=await db.loadAll();
        data=await db.seedIfEmpty(data);
        setProductos(data.productos);
        setClientes(data.clientes);
        setVentas(data.ventas);
        setProveedores(data.proveedores);
      }catch(e){console.error("Error cargando datos:",e);}
      setLoading(false);
      const s=document.getElementById("splash");
      if(s){s.style.opacity="0";setTimeout(()=>s.remove(),400);}
    })();
  },[]);

  if(loading)return null;

  const allNav=[...NAV_SIDE,...NAV_MAS];
  const getTitle=()=>allNav.find(x=>x.id===view)?.label||"TD Gestión";

  const content=(<>
    {view==="dashboard"&&<Dashboard productos={productos} clientes={clientes} ventas={ventas} setView={setView}/>}
    {view==="productos"&&<Productos productos={productos} setProd={setProductos} isMobile={isMobile}/>}
    {view==="clientes"&&<Clientes clientes={clientes} setCli={setClientes}/>}
    {view==="nueva-venta"&&<NuevaVenta productos={productos} setProd={setProductos} clientes={clientes} ventas={ventas} setVentas={setVentas} setView={setView} isMobile={isMobile}/>}
    {view==="comprobantes"&&<Comprobantes ventas={ventas} isMobile={isMobile}/>}
    {view==="remitos"&&<Remitos ventas={ventas} setVentas={setVentas}/>}
    {view==="listas"&&<ListasPrecios productos={productos} clientes={clientes} isMobile={isMobile}/>}
    {view==="proveedor"&&<Proveedores productos={productos} proveedores={proveedores} setProv={setProveedores}/>}
    {view==="config"&&<Config/>}
  </>);

  if(isMobile) return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh",fontFamily:"Montserrat,sans-serif",background:D,color:W}}>
      <TopBar title={getTitle()}/>
      <main style={{flex:1,overflowY:"auto"}}>{content}</main>
      <BottomNav view={view} setView={setView}/>
    </div>
  );

  return(
    <div style={{display:"flex",height:"100vh",overflow:"hidden",fontFamily:"Montserrat,sans-serif",background:D,color:W}}>
      <Sidebar view={view} setView={setView} collapsed={coll} setCollapsed={setColl}/>
      <main style={{flex:1,overflowY:"auto"}}>{content}</main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
  </script>
</body>
</html>
